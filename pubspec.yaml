name: tubedl
description: "Micro-browser + YouTube video/audio downloader. Android-first."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.0.0

  # YouTube stream extraction
  youtube_explode_dart: ^3.1.0

  # Downloads (WorkManager-backed, survives background kill)
  flutter_downloader: ^1.11.9

  # Players
  just_audio: ^0.9.41
  video_player: ^2.9.1

  # Persistence
  sqflite: ^2.3.3
  shared_preferences: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.4

  # Permissions / sharing
  permission_handler: ^11.3.1
  share_plus: ^13.1.0

  # Images
  cached_network_image: ^3.4.0

  # Audio extraction/transcoding only (m4a copy, mp3 via libmp3lame).
  # Audio variant: includes lame, no video codecs -> much smaller APK.
  ffmpeg_kit_flutter_new_audio: ^2.0.0

  cupertino_icons: ^1.0.8
  flutter_foreground_task: ^9.2.2

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.1
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/branding/

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/branding/icon.png
  android_12:
    color: "#FFFFFF"
    image: assets/branding/icon.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/branding/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/branding/icon.png"
